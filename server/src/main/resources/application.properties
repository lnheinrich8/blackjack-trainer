spring.application.name=server

# Log one line per incoming HTTP request (see RequestLoggingConfig)
logging.level.com.example.server.config.SingleLineRequestLoggingFilter=DEBUG

# AI coach: local Ollama (no API key). See OllamaProperties / OllamaClient.
ollama.base-url=http://localhost:11434
ollama.model=qwen2.5:7b
ollama.temperature=0.4
ollama.timeout-ms=60000